name: qr2link
description: Decode QR codes from screenshots into links, in your browser.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  zxing2: ^0.2.4
  image: ^4.8.0
  file_picker: ^11.0.2
  super_drag_and_drop: ^0.9.1
  super_clipboard: ^0.9.1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
